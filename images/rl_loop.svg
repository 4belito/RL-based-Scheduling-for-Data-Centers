<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5FAFF"/>
      <stop offset="1" stop-color="#ECF7F6"/>
    </linearGradient>
    <linearGradient id="dcGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13386B"/>
      <stop offset="1" stop-color="#0B2545"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33B4A4"/>
      <stop offset="1" stop-color="#2A9D8F"/>
    </linearGradient>
    <filter id="soft2" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#0B2545" flood-opacity="0.16"/>
    </filter>
    <filter id="soft2sm" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0B2545" flood-opacity="0.14"/>
    </filter>
    <marker id="aBlue" markerWidth="13" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L13,5.5 L0,11 Z" fill="#0B2545"/>
    </marker>
    <marker id="aGreen" markerWidth="13" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L13,5.5 L0,11 Z" fill="#2A9D8F"/>
    </marker>
    <marker id="aCoral" markerWidth="13" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L13,5.5 L0,11 Z" fill="#E76F51"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="url(#bg2)"/>
  <circle cx="1180" cy="80" r="90" fill="#2A9D8F" opacity="0.06"/>
  <circle cx="90" cy="650" r="70" fill="#E9C46A" opacity="0.10"/>

  <!-- Title -->
  <text x="640" y="56" text-anchor="middle" font-size="34" font-weight="700" fill="#0B2545">Why RL for Scheduling?</text>

  <!-- ===== DATA CENTER (top) ===== -->
  <g filter="url(#soft2)">
    <rect x="440" y="108" width="400" height="120" rx="18" fill="url(#dcGrad)"/>
  </g>
  <!-- server rack icon -->
  <rect x="478" y="138" width="60" height="60" rx="6" fill="#1B4A82" stroke="#5B86B8" stroke-width="2"/>
  <rect x="486" y="148" width="44" height="8" rx="2" fill="#E9C46A"/>
  <rect x="486" y="162" width="44" height="8" rx="2" fill="#2A9D8F"/>
  <rect x="486" y="176" width="44" height="8" rx="2" fill="#5B86B8"/>
  <text x="615" y="162" text-anchor="middle" font-size="26" font-weight="700" fill="#FFFFFF">Data Center</text>
  <text x="615" y="190" text-anchor="middle" font-size="16" fill="#9FC0E6">the environment</text>

  <!-- ===== RL AGENT (bottom) ===== -->
  <g filter="url(#soft2)">
    <rect x="440" y="492" width="400" height="120" rx="18" fill="url(#agentGrad)"/>
  </g>
  <!-- brain/agent icon -->
  <circle cx="508" cy="552" r="30" fill="#1E7D72" stroke="#BDEAE3" stroke-width="2"/>
  <circle cx="498" cy="545" r="5" fill="#BDEAE3"/>
  <circle cx="518" cy="545" r="5" fill="#BDEAE3"/>
  <circle cx="500" cy="562" r="5" fill="#BDEAE3"/>
  <circle cx="520" cy="562" r="5" fill="#BDEAE3"/>
  <line x1="498" y1="545" x2="518" y2="545" stroke="#BDEAE3" stroke-width="2"/>
  <line x1="498" y1="545" x2="500" y2="562" stroke="#BDEAE3" stroke-width="2"/>
  <line x1="518" y1="545" x2="520" y2="562" stroke="#BDEAE3" stroke-width="2"/>
  <line x1="500" y1="562" x2="520" y2="562" stroke="#BDEAE3" stroke-width="2"/>
  <text x="615" y="546" text-anchor="middle" font-size="26" font-weight="700" fill="#FFFFFF">RL Agent</text>
  <text x="615" y="574" text-anchor="middle" font-size="16" fill="#D6F0EB">the policy network</text>

  <!-- ===== STATE arrow (left, down) ===== -->
  <path d="M388,232 C300,300 300,420 388,488" stroke="#0B2545" stroke-width="5" fill="none" marker-end="url(#aBlue)"/>
  <g filter="url(#soft2sm)">
    <rect x="120" y="312" width="184" height="96" rx="14" fill="#FFFFFF" stroke="#0B2545" stroke-width="2"/>
  </g>
  <text x="212" y="344" text-anchor="middle" font-size="20" font-weight="700" fill="#0B2545">STATE</text>
  <text x="212" y="370" text-anchor="middle" font-size="15" fill="#3A4A60">queue + machine</text>
  <text x="212" y="390" text-anchor="middle" font-size="15" fill="#3A4A60">status + power</text>

  <!-- ===== ACTION arrow (right, up) ===== -->
  <path d="M892,488 C980,420 980,300 892,232" stroke="#2A9D8F" stroke-width="5" fill="none" marker-end="url(#aGreen)"/>
  <g filter="url(#soft2sm)">
    <rect x="976" y="312" width="184" height="96" rx="14" fill="#FFFFFF" stroke="#2A9D8F" stroke-width="2"/>
  </g>
  <text x="1068" y="344" text-anchor="middle" font-size="20" font-weight="700" fill="#1E7D72">ACTION</text>
  <text x="1068" y="370" text-anchor="middle" font-size="15" fill="#3C8377">assign job</text>
  <text x="1068" y="390" text-anchor="middle" font-size="15" fill="#3C8377">to a server</text>

  <!-- ===== REWARD arrow (center, down) ===== -->
  <path d="M640,232 L640,488" stroke="#E76F51" stroke-width="5" fill="none" marker-end="url(#aCoral)"/>
  <g filter="url(#soft2sm)">
    <rect x="548" y="312" width="184" height="96" rx="14" fill="#FDEEEA" stroke="#E76F51" stroke-width="2"/>
  </g>
  <text x="640" y="344" text-anchor="middle" font-size="20" font-weight="700" fill="#E76F51">REWARD</text>
  <text x="640" y="370" text-anchor="middle" font-size="15" fill="#9E3A22">+ utilization</text>
  <text x="640" y="390" text-anchor="middle" font-size="15" fill="#9E3A22">&#8722; latency &#8722; energy</text>

  <!-- ===== insight chips (corners) ===== -->
  <g filter="url(#soft2sm)"><rect x="60" y="118" width="220" height="64" rx="12" fill="#E9F6F4" stroke="#2A9D8F" stroke-width="1.5"/></g>
  <text x="170" y="146" text-anchor="middle" font-size="15" fill="#3C8377">decisions shape the</text>
  <text x="170" y="166" text-anchor="middle" font-size="16" font-weight="700" fill="#176055">future queue</text>

  <g filter="url(#soft2sm)"><rect x="1000" y="118" width="220" height="64" rx="12" fill="#E9F6F4" stroke="#2A9D8F" stroke-width="1.5"/></g>
  <text x="1110" y="146" text-anchor="middle" font-size="15" fill="#3C8377">feedback is</text>
  <text x="1110" y="166" text-anchor="middle" font-size="16" font-weight="700" fill="#176055">delayed in time</text>

  <g filter="url(#soft2sm)"><rect x="60" y="538" width="220" height="64" rx="12" fill="#E9F6F4" stroke="#2A9D8F" stroke-width="1.5"/></g>
  <text x="170" y="566" text-anchor="middle" font-size="15" fill="#3C8377">optimizes the</text>
  <text x="170" y="586" text-anchor="middle" font-size="16" font-weight="700" fill="#176055">long-term return</text>

  <g filter="url(#soft2sm)"><rect x="1000" y="538" width="220" height="64" rx="12" fill="#E9F6F4" stroke="#2A9D8F" stroke-width="1.5"/></g>
  <text x="1110" y="566" text-anchor="middle" font-size="15" fill="#3C8377">adapts to shifting</text>
  <text x="1110" y="586" text-anchor="middle" font-size="16" font-weight="700" fill="#176055">workloads</text>

  <!-- ===== bottom summary ===== -->
  <g filter="url(#soft2)">
    <rect x="220" y="640" width="840" height="56" rx="16" fill="#0B2545"/>
  </g>
  <text x="640" y="668" text-anchor="middle" font-size="18" font-weight="700" fill="#FFFFFF">RL learns policies that optimize <tspan fill="#E9C46A">cumulative</tspan> impact &#8212; not just instant decisions</text>
  <text x="640" y="686" text-anchor="middle" font-size="13" fill="#9FC0E6">sequential, delayed-reward decision making is exactly what RL is built for</text>
</svg>
