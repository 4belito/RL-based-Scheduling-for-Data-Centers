<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5FAFF"/>
      <stop offset="1" stop-color="#ECF7F6"/>
    </linearGradient>
    <linearGradient id="redZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDEEEA"/>
      <stop offset="1" stop-color="#FBDDD4"/>
    </linearGradient>
    <linearGradient id="greenZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EAF7F5"/>
      <stop offset="1" stop-color="#D6F0EB"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E76F51"/>
      <stop offset="1" stop-color="#2A9D8F"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0B2545" flood-opacity="0.12"/>
    </filter>
    <filter id="softSm" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0B2545" flood-opacity="0.14"/>
    </filter>
    <marker id="ah" markerWidth="14" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L14,6 L0,12 Z" fill="#2A9D8F"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1180" cy="80" r="90" fill="#2A9D8F" opacity="0.06"/>
  <circle cx="90" cy="650" r="70" fill="#E9C46A" opacity="0.10"/>

  <!-- Title -->
  <text x="640" y="56" text-anchor="middle" font-size="34" font-weight="700" fill="#0B2545">Why Better Scheduling?</text>

  <!-- ===================== LEFT: POOR ===================== -->
  <rect x="48" y="92" width="430" height="500" rx="22" fill="url(#redZone)" stroke="#E76F51" stroke-width="3" filter="url(#soft)"/>
  <rect x="48" y="92" width="430" height="58" rx="22" fill="#E76F51"/>
  <rect x="48" y="120" width="430" height="30" fill="#E76F51"/>
  <text x="263" y="131" text-anchor="middle" font-size="24" font-weight="700" fill="#FFFFFF">POOR SCHEDULING</text>

  <!-- card 1: clock -->
  <g filter="url(#softSm)">
    <rect x="74" y="172" width="378" height="86" rx="14" fill="#FFFFFF" stroke="#F0B5A6" stroke-width="1.5"/>
  </g>
  <circle cx="118" cy="215" r="24" fill="#FCE2DA" stroke="#E76F51" stroke-width="3"/>
  <line x1="118" y1="215" x2="118" y2="199" stroke="#E76F51" stroke-width="3" stroke-linecap="round"/>
  <line x1="118" y1="215" x2="131" y2="222" stroke="#E76F51" stroke-width="3" stroke-linecap="round"/>
  <text x="160" y="208" font-size="20" font-weight="700" fill="#9E3A22">Long job wait times</text>
  <text x="160" y="234" font-size="15" fill="#B5654E">jobs sit idle in the queue</text>

  <!-- card 2: unbalanced servers -->
  <g filter="url(#softSm)">
    <rect x="74" y="268" width="378" height="86" rx="14" fill="#FFFFFF" stroke="#F0B5A6" stroke-width="1.5"/>
  </g>
  <rect x="98" y="318" width="14" height="20" rx="2" fill="#E76F51"/>
  <rect x="116" y="300" width="14" height="38" rx="2" fill="#E76F51"/>
  <rect x="134" y="324" width="14" height="14" rx="2" fill="#F0B5A6"/>
  <text x="160" y="304" font-size="20" font-weight="700" fill="#9E3A22">Idle or overloaded servers</text>
  <text x="160" y="330" font-size="15" fill="#B5654E">load is poorly distributed</text>

  <!-- card 3: energy/flame -->
  <g filter="url(#softSm)">
    <rect x="74" y="364" width="378" height="86" rx="14" fill="#FFFFFF" stroke="#F0B5A6" stroke-width="1.5"/>
  </g>
  <path d="M118,386 C108,400 102,410 102,420 a16,16 0 0 0 32,0 c0,-8 -6,-12 -8,-20 c-4,8 -10,6 -8,-14 Z" fill="#E76F51"/>
  <text x="160" y="400" font-size="20" font-weight="700" fill="#9E3A22">High energy waste</text>
  <text x="160" y="426" font-size="15" fill="#B5654E">power burned with no value</text>

  <!-- card 4: SLA sad -->
  <g filter="url(#softSm)">
    <rect x="74" y="460" width="378" height="86" rx="14" fill="#FFFFFF" stroke="#F0B5A6" stroke-width="1.5"/>
  </g>
  <circle cx="118" cy="503" r="24" fill="#FCE2DA" stroke="#E76F51" stroke-width="3"/>
  <circle cx="110" cy="497" r="3" fill="#9E3A22"/>
  <circle cx="126" cy="497" r="3" fill="#9E3A22"/>
  <path d="M107,515 Q118,506 129,515" stroke="#9E3A22" stroke-width="3" fill="none" stroke-linecap="round"/>
  <text x="160" y="496" font-size="20" font-weight="700" fill="#9E3A22">SLA violations</text>
  <text x="160" y="522" font-size="15" fill="#B5654E">unhappy users, lost trust</text>

  <!-- ===================== CENTER ARROW ===================== -->
  <path d="M500,330 L780,330" stroke="url(#arrowGrad)" stroke-width="16" fill="none" marker-end="url(#ah)" stroke-linecap="round"/>
  <g filter="url(#soft)">
    <rect x="548" y="300" width="184" height="62" rx="14" fill="#0B2545"/>
  </g>
  <text x="640" y="328" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">Smart</text>
  <text x="640" y="352" text-anchor="middle" font-size="20" font-weight="700" fill="#E9C46A">Scheduler</text>

  <!-- ===================== RIGHT: BETTER ===================== -->
  <rect x="802" y="92" width="430" height="500" rx="22" fill="url(#greenZone)" stroke="#2A9D8F" stroke-width="3" filter="url(#soft)"/>
  <rect x="802" y="92" width="430" height="58" rx="22" fill="#2A9D8F"/>
  <rect x="802" y="120" width="430" height="30" fill="#2A9D8F"/>
  <text x="1017" y="131" text-anchor="middle" font-size="24" font-weight="700" fill="#FFFFFF">BETTER SCHEDULING</text>

  <!-- card 1: lightning -->
  <g filter="url(#softSm)">
    <rect x="828" y="172" width="378" height="86" rx="14" fill="#FFFFFF" stroke="#A8DDD5" stroke-width="1.5"/>
  </g>
  <path d="M876,191 L862,219 L874,219 L868,239 L888,209 L876,209 Z" fill="#2A9D8F"/>
  <text x="914" y="208" font-size="20" font-weight="700" fill="#176055">Faster job turnaround</text>
  <text x="914" y="234" font-size="15" fill="#3C8377">lower latency end-to-end</text>

  <!-- card 2: balance -->
  <g filter="url(#softSm)">
    <rect x="828" y="268" width="378" height="86" rx="14" fill="#FFFFFF" stroke="#A8DDD5" stroke-width="1.5"/>
  </g>
  <line x1="872" y1="298" x2="872" y2="340" stroke="#2A9D8F" stroke-width="3"/>
  <line x1="852" y1="306" x2="892" y2="306" stroke="#2A9D8F" stroke-width="3"/>
  <path d="M852,306 l-7,16 h14 Z" fill="#A8DDD5" stroke="#2A9D8F" stroke-width="2"/>
  <path d="M892,306 l-7,16 h14 Z" fill="#A8DDD5" stroke="#2A9D8F" stroke-width="2"/>
  <text x="914" y="304" font-size="20" font-weight="700" fill="#176055">Balanced server load</text>
  <text x="914" y="330" font-size="15" fill="#3C8377">resources used efficiently</text>

  <!-- card 3: money (gold) -->
  <g filter="url(#softSm)">
    <rect x="828" y="364" width="378" height="86" rx="14" fill="#FFFFFF" stroke="#EAD49A" stroke-width="1.5"/>
  </g>
  <circle cx="872" cy="407" r="24" fill="#F7E7B6" stroke="#E9C46A" stroke-width="3"/>
  <text x="872" y="415" text-anchor="middle" font-size="24" font-weight="700" fill="#A9821F">$</text>
  <text x="914" y="400" font-size="20" font-weight="700" fill="#8B6914">Lower power bills</text>
  <text x="914" y="426" font-size="15" fill="#A9821F">direct cost &amp; carbon savings</text>

  <!-- card 4: happy -->
  <g filter="url(#softSm)">
    <rect x="828" y="460" width="378" height="86" rx="14" fill="#FFFFFF" stroke="#A8DDD5" stroke-width="1.5"/>
  </g>
  <circle cx="872" cy="503" r="24" fill="#D6F0EB" stroke="#2A9D8F" stroke-width="3"/>
  <circle cx="864" cy="497" r="3" fill="#176055"/>
  <circle cx="880" cy="497" r="3" fill="#176055"/>
  <path d="M861,508 Q872,519 883,508" stroke="#176055" stroke-width="3" fill="none" stroke-linecap="round"/>
  <text x="914" y="496" font-size="20" font-weight="700" fill="#176055">Happy customers</text>
  <text x="914" y="522" font-size="15" fill="#3C8377">SLAs met, trust retained</text>

  <!-- ===================== BOTTOM IMPACT ===================== -->
  <g filter="url(#soft)">
    <rect x="160" y="624" width="960" height="64" rx="16" fill="#0B2545"/>
  </g>
  <text x="640" y="654" text-anchor="middle" font-size="19" font-weight="700" fill="#FFFFFF">Data centers use 1&#8211;2% of global electricity</text>
  <text x="640" y="678" text-anchor="middle" font-size="16" fill="#E9C46A">smarter scheduling directly cuts cost and carbon</text>
</svg>
